<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard Kegiatan Harian</title><link rel="stylesheet" href="style.css"></head><body><div class="shell"><header><div class="brand"><img src="logo.png" class="logo" alt="Logo" onerror="this.style.display='none'"><div><small>COMMAND CENTER</small><h1>DASHBOARD KEGIATAN HARIAN</h1><b id="organizationName"></b></div></div><div class="weather"><span id="weatherIcon">🌤️</span><div><strong id="weatherTemp">--°C</strong><em id="weatherText">Mengambil cuaca Nabire...</em><small id="weatherUpdated"></small></div></div><div class="clock"><strong id="clock">00:00:00</strong><span id="fullDate"></span></div></header><section class="stats"><div><span>Total Agenda</span><b id="totalCount">0</b></div><div><span>Tugas Luar/Kegiatan Luar</span><b id="outsideCount">0</b></div><div><span>Di Kantor</span><b id="officeCount">0</b></div><div><span>Rapat</span><b id="meetingCount">0</b></div><div><span>Istirahat</span><b id="istirahatCount">0</b></div><div><span>Cuti/Libur</span><b id="leaveCount">0</b></div></section><main><section class="agenda panel"><div class="heading"><div><small>AGENDA HARI INI</small><h2>Kegiatan Pegawai</h2></div><span id="lastRefresh">Memuat data...</span></div><div id="ongoingBanner" class="ongoing hidden"></div><div id="activityList" class="activities"></div><div id="pagination" class="pagination"></div></section><aside><section class="panel"><div class="heading"><div><small>KALENDER</small><h3 id="calendarMonth"></h3></div></div><div class="week"><span>MIN</span><span>SEN</span><span>SEL</span><span>RAB</span><span>KAM</span><span>JUM</span><span>SAB</span></div><div id="calendarGrid" class="calendar"></div></section><section class="panel"><div class="heading"><div><small>AGENDA BESOK</small><h3 id="tomorrowDate"></h3></div></div><div id="tomorrowList"></div></section></aside></main><footer><b>INFORMASI</b><div><span id="tickerText"></span></div><small>● SISTEM AKTIF</small></footer></div><script src="config.js"></script><script src="app.js"></script></body></html>
